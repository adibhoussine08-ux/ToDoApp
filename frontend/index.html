<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset & Variables ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f0f11;
      --surface:   #1a1a1f;
      --surface2:  #232329;
      --border:    #2e2e36;
      --accent:    #f5c842;
      --accent2:   #ff7b54;
      --text:      #e8e8e8;
      --muted:     #7a7a8c;
      --done:      #3a3a45;
      --radius:    14px;
      --shadow:    0 8px 40px rgba(0,0,0,0.5);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 3rem 1rem 5rem;
    }

    /* ── Container ── */
    .container {
      width: 100%;
      max-width: 640px;
    }

    /* ── Header ── */
    header {
      margin-bottom: 2.5rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.5rem;
    }

    .logo-icon {
      width: 38px; height: 38px;
      background: var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2.4rem;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    h1 span { color: var(--accent); }

    .subtitle {
      color: var(--muted);
      font-size: 0.95rem;
      margin-top: 0.4rem;
    }

    /* ── Stats ── */
    .stats {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      text-align: center;
    }

    .stat-value {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      line-height: 1;
      color: var(--accent);
    }

    .stat-label {
      font-size: 0.78rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 0.3rem;
    }

    /* ── Formulaire d'ajout ── */
    .add-form {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .add-form input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      padding: 0.85rem 1.1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .add-form input::placeholder { color: var(--muted); }

    .add-form input:focus {
      border-color: var(--accent);
    }

    #btn-add {
      background: var(--accent);
      color: #0f0f11;
      border: none;
      border-radius: var(--radius);
      padding: 0 1.4rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, background 0.15s;
      flex-shrink: 0;
    }

    #btn-add:hover { background: #ffd460; transform: scale(1.05); }
    #btn-add:active { transform: scale(0.97); }

    /* ── Message d'erreur ── */
    #error-msg {
      background: #3b1212;
      border: 1px solid #7a2222;
      color: #ff8080;
      border-radius: 10px;
      padding: 0.7rem 1rem;
      font-size: 0.9rem;
      margin-bottom: 1.2rem;
      display: none;
      animation: slideDown 0.25s ease;
    }

    #error-msg.visible { display: block; }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Liste des tâches ── */
    #todo-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .loading, .empty {
      text-align: center;
      color: var(--muted);
      padding: 2.5rem;
      font-size: 0.95rem;
    }

    /* ── Tâche individuelle ── */
    .todo-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      gap: 0.9rem;
      padding: 0.85rem 1rem;
      transition: border-color 0.2s, background 0.2s, opacity 0.3s, transform 0.3s;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .todo-item:hover { border-color: #3e3e4a; }

    .todo-item.completed {
      background: var(--done);
      opacity: 0.75;
    }

    .todo-item.completed .todo-title {
      text-decoration: line-through;
      color: var(--muted);
    }

    .todo-item.removing {
      opacity: 0;
      transform: translateX(30px);
    }

    /* ── Checkbox custom ── */
    .todo-check {
      position: relative;
      flex-shrink: 0;
    }

    .todo-check input { display: none; }

    .checkmark {
      width: 22px; height: 22px;
      border: 2px solid var(--border);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .todo-check input:checked + .checkmark {
      background: var(--accent);
      border-color: var(--accent);
    }

    .todo-check input:checked + .checkmark::after {
      content: '✓';
      font-size: 0.85rem;
      font-weight: 700;
      color: #0f0f11;
    }

    .todo-title {
      flex: 1;
      font-size: 0.97rem;
      line-height: 1.4;
      word-break: break-word;
    }

    /* ── Input d'édition inline ── */
    .edit-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--accent);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.97rem;
      padding: 0.3rem 0.6rem;
      outline: none;
    }

    /* ── Boutons d'action ── */
    .todo-actions {
      display: flex;
      gap: 0.4rem;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .todo-item:hover .todo-actions { opacity: 1; }

    .btn-edit, .btn-delete {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      cursor: pointer;
      font-size: 0.85rem;
      padding: 0.3rem 0.5rem;
      transition: background 0.15s, transform 0.1s;
    }

    .btn-edit:hover  { background: #2e2e3a; transform: scale(1.1); }
    .btn-delete:hover { background: #3b1212; border-color: #7a2222; transform: scale(1.1); }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      h1 { font-size: 1.8rem; }
      .stats { gap: 0.6rem; }
      .todo-actions { opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- Header -->
    <header>
      <div class="logo">
        <div class="logo-icon">📋</div>
      </div>
      <h1>Todo <span>App</span></h1>
      <p class="subtitle">Organisez vos tâches simplement.</p>
    </header>

    <!-- Stats -->
    <div class="stats">
      <div class="stat-card">
        <div class="stat-value" id="stats-total">0</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stats-done">0</div>
        <div class="stat-label">Terminées</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stats-left">0</div>
        <div class="stat-label">Restantes</div>
      </div>
    </div>

    <!-- Formulaire d'ajout -->
    <div class="add-form">
      <input
        type="text"
        id="input-title"
        placeholder="Nouvelle tâche... (Entrée pour valider)"
        maxlength="120"
      />
      <button id="btn-add">+</button>
    </div>

    <!-- Message d'erreur -->
    <div id="error-msg"></div>

    <!-- Liste des tâches -->
    <ul id="todo-list"></ul>

  </div>

  <script src="script.js"></script>
</body>
</html>
